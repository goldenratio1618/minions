<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Minions of Darkness</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <details class="view-menu">
          <summary aria-label="Open navigation menu">☰</summary>
          <nav class="tabs">
            <button class="tab active" data-view="play">Gameplay</button>
            <button class="tab" data-view="tutorial">Tutorial</button>
            <button class="tab" data-view="maps">Map Lab</button>
            <button class="tab" data-view="units">Unit Lab</button>
          </nav>
        </details>
      </header>

      <section id="notice" class="notice"></section>

      <section id="play-view" class="view active">
        <div id="game-root" class="game-root empty-state"></div>
      </section>

      <section id="maps-view" class="view">
        <div class="lab-header">
          <h2>Random Map Generator</h2>
          <button id="generate-map">Generate Map</button>
        </div>
        <div id="map-lab" class="lab-output"></div>
      </section>

      <section id="tutorial-view" class="view">
        <div id="tutorial-root" class="tutorial-root"></div>
      </section>

      <section id="units-view" class="view">
        <div class="lab-header">
          <h2>Random Unit Generator</h2>
          <label class="lab-control">
            Turn
            <input id="unit-turn-input" type="number" min="1" max="60" value="1" />
          </label>
          <button id="generate-unit">Generate Unit</button>
        </div>
        <div class="unit-lab-grid">
          <div id="unit-lab" class="lab-output"></div>
          <div class="fit-panel">
            <h3>Existing Unit Fit</h3>
            <img src="/static/unit-fit.svg" alt="Unit cost fit plot" />
          </div>
        </div>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
