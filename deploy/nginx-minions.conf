limit_req_zone $binary_remote_addr zone=minions_api:10m rate=8r/s;
limit_conn_zone $binary_remote_addr zone=minions_conn:10m;

server {
    listen 80 default_server backlog=4096 reuseport;
    listen [::]:80 default_server backlog=4096 reuseport;
    server_name minions.local;

    access_log /var/log/nginx/minions.access.log;
    error_log /var/log/nginx/minions.error.log warn;

    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 15s;
    keepalive_requests 100;
    reset_timedout_connection on;
    send_timeout 20s;

    client_max_body_size 1m;
    limit_conn minions_conn 20;

    location /api/ {
        limit_req zone=minions_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_read_timeout 65s;
        proxy_send_timeout 20s;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_read_timeout 30s;
        proxy_send_timeout 20s;
    }
}
